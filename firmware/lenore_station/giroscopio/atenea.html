<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Atenea Flight Computer - GCS</title>
    <style>
        body { 
            background-color: #1a1a24; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; margin: 0; padding: 20px;
        }
        h1 { color: #00d2ff; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;}
        .status-bar { margin-bottom: 30px; font-weight: bold; color: #ff3333; }
        
        .dashboard {
            display: flex; justify-content: center; align-items: center; gap: 40px;
            flex-wrap: wrap;
        }

        .instrument {
            width: 250px; height: 250px;
            border-radius: 50%;
            background: #2b2b36;
            border: 8px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .instrument-title {
            position: absolute; top: 15px; font-size: 14px; font-weight: bold; color: #aaa; z-index: 10;
        }

        .digital-value { font-size: 40px; font-weight: bold; font-family: monospace; z-index: 10; text-shadow: 0 0 10px rgba(0,255,255,0.5); }
        .unit { font-size: 14px; color: #888; z-index: 10; }
        
        .ring { position: absolute; width: 90%; height: 90%; border-radius: 50%; border: 4px dashed #555; z-index: 1; }
        
        .needle {
            position: absolute; width: 4px; height: 110px; background: #ff3366;
            bottom: 50%; left: calc(50% - 2px);
            transform-origin: bottom center; transform: rotate(-135deg);
            transition: transform 0.1s ease-out; z-index: 5;
            border-radius: 4px 4px 0 0; box-shadow: 0 0 10px #ff3366;
        }

        .horizon-bg {
            width: 600px; height: 600px;
            background: linear-gradient(to bottom, #1e90ff 50%, #8b4513 50%);
            position: absolute; top: -175px; left: -175px;
            transition: transform 0.1s linear; z-index: 2;
        }
        .plane-symbol {
            position: absolute; top: 50%; left: 50%; width: 140px; height: 4px; background: #ffcc00;
            transform: translate(-50%, -50%); z-index: 5; box-shadow: 0 0 5px black;
        }
        .plane-symbol::before {
            content: ''; position: absolute; left: 65px; top: -5px; width: 10px; height: 10px;
            background: #ffcc00; border-radius: 50%;
        }
    </style>
</head>
<body>

    <h1>🚀 Estación de Tierra Atenea</h1>
    <div id="status" class="status-bar">Desconectado del servidor Node.js 🔴</div>
    
    <div class="dashboard">
        <!-- VELOCÍMETRO -->
        <div class="instrument">
            <div class="instrument-title">VELOCIDAD</div>
            <div class="ring"></div>
            <div class="needle" id="needle-speed"></div>
            <div class="digital-value" id="val-speed">0</div>
            <div class="unit">m/s</div>
        </div>

        <!-- HORIZONTE -->
        <div class="instrument" style="border-color: #555;">
            <div class="instrument-title" style="color: white; text-shadow: 1px 1px 2px black;">ACTITUD</div>
            <div class="horizon-bg" id="horizon-layer"></div>
            <div class="plane-symbol"></div>
        </div>

        <!-- ALTÍMETRO -->
        <div class="instrument">
            <div class="instrument-title">ALTITUD</div>
            <div class="ring"></div>
            <div class="needle" id="needle-alt"></div>
            <div class="digital-value" id="val-alt">0</div>
            <div class="unit">metros AGL</div>
        </div>

        <!-- TOBERA (TVC) -->
        <div class="instrument" style="border-color: #ffcc00; overflow: visible;">
            <div class="instrument-title" style="color: #ffcc00; text-shadow: 1px 1px 2px black;">TOBERA (PITCH)</div>
            <div style="position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 10px;">
                <!-- Cuerpo del cohete -->
                <div style="width: 40px; height: 90px; background: #ddd; border-radius: 5px 5px 0 0; z-index: 2; border: 2px solid #555;">
                    <div style="text-align: center; color: #333; font-weight: bold; margin-top: 30px; font-size: 10px; transform: rotate(-90deg);">ATENEA</div>
                </div>
                <!-- Tobera pivotante -->
                <div id="nozzle" style="width: 30px; height: 35px; background: linear-gradient(to bottom, #888, #444); clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%); transform-origin: top center; transition: transform 0.05s linear; z-index: 1; border-top: 2px solid #222;">
                    <!-- Fuego simulado -->
                    <div style="width: 100%; height: 40px; background: linear-gradient(to bottom, #ff9900, #ff3300, transparent); margin-top: 35px; opacity: 0.8; filter: blur(3px); transform-origin: top center; animation: flicker 0.1s infinite alternate;"></div>
                </div>
            </div>
            <div class="digital-value" id="val-servo" style="position: absolute; bottom: 20px; font-size: 24px; color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.5);">90°</div>
        </div>
    </div>

    <style>
        @keyframes flicker {
            0% { transform: scaleX(1) scaleY(1); opacity: 0.8; }
            100% { transform: scaleX(1.1) scaleY(1.2); opacity: 1; }
        }
    </style>

    <script>
        const horizon = document.getElementById('horizon-layer');
        const speedVal = document.getElementById('val-speed');
        const speedNeedle = document.getElementById('needle-speed');
        const altVal = document.getElementById('val-alt');
        const altNeedle = document.getElementById('needle-alt');
        const nozzle = document.getElementById('nozzle');
        const servoVal = document.getElementById('val-servo');
        const statusText = document.getElementById('status');
        
        function actualizarDashboard(pitch, roll, altitud, velocidad, servoPitch) {
            let despY = pitch * 3; 
            horizon.style.transform = `rotate(${roll}deg) translateY(${despY}px)`;

            altVal.innerText = Math.round(altitud);
            let gradosAlt = (altitud % 1000) * (360 / 1000); 
            altNeedle.style.transform = `rotate(${gradosAlt}deg)`;

            speedVal.innerText = Math.round(velocidad);
            let gradosVel = -135 + (velocidad / 343) * 270;
            if(gradosVel > 135) gradosVel = 135; 
            speedNeedle.style.transform = `rotate(${gradosVel}deg)`;

            // --- ANIMACIÓN DE LA TOBERA ---
            let gradosServo = (servoPitch || 90) - 90;
            nozzle.style.transform = `rotate(${-gradosServo}deg)`; // Refleja el movimiento físico del servo
            servoVal.innerText = `${servoPitch || 90}°`;
        }

        // --- CONEXIÓN AUTOMÁTICA WEBSOCKET A NODE.JS ---
        function iniciarConexion() {
            const ws = new WebSocket('ws://localhost:8765');

            ws.onopen = () => {
                statusText.innerText = "Conectado al Motor de Telemetría 🟢";
                statusText.style.color = "#28a745";
            };

            ws.onmessage = (evento) => {
                const datos = JSON.parse(evento.data);
                actualizarDashboard(datos.pitch, datos.roll, datos.altitud, datos.velocidad, datos.servo_pitch);
            };

            ws.onclose = () => {
                statusText.innerText = "Conexión perdida. Reconectando... 🔴";
                statusText.style.color = "#ff3333";
                setTimeout(iniciarConexion, 2000); // Intenta reconectar cada 2 segundos
            };
        }

        iniciarConexion();
    </script>
</body>
</html>
